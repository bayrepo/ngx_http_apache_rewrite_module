<VirtualHost *:80>
    DocumentRoot "/sites/site2"
    ServerName example2.com

    <Directory /sites/site2>
        Options +Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <FilesMatch \.php$>
	    SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

</VirtualHost>

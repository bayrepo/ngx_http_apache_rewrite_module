<VirtualHost *:80>
    DocumentRoot "/sites/site3"
    ServerName example3.com

    DirectoryIndex index.php

    <Directory /sites/site3/wordpress>
        Options +Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <FilesMatch \.php$>
	    SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

</VirtualHost>

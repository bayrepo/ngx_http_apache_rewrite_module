<VirtualHost *:80>
    DocumentRoot "/sites/site4"
    ServerName example4.com

    DirectoryIndex index.php

    <Directory /sites/site4>
        Options +Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <FilesMatch \.php$>
    	SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>

</VirtualHost>
